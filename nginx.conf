upstream selora_backend {
    # Define your backend servers here for load balancing.
    # PM2 running in cluster mode handles multiple instances on a single machine.
    # If using multiple physical servers, list their IPs here.
    
    server 127.0.0.1:3000;
    # server 192.168.1.101:3000; # Backup server 1
    # server 192.168.1.102:3000; # Backup server 2
}

server {
    listen 80;
    server_name selora.io www.selora.io;

    # Enforce HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name selora.io www.selora.io;

    # SSL Configuration (Replace with actual paths)
    ssl_certificate /etc/nginx/ssl/selora.io.crt;
    ssl_certificate_key /etc/nginx/ssl/selora.io.key;

    # Security Headers
    add_header X-Frame-Options "DENY";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin";

    # Proxy to Load Balancer
    location / {
        proxy_pass http://selora_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;

        # Forward real IP to backend
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
